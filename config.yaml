# ==============================================================================
# CONFIGURATION GÉNÉRALE D'EXPÉRIMENTATION
# Commande : CUDA_VISIBLE_DEVICES=0,1 python create_heatmaps.py --config config.yaml
# ==============================================================================

exp_arguments:
  n_classes: 2
  save_exp_code: "HEATMAP_OUTPUT"
  raw_save_dir: "heatmaps/heatmap_raw_results"
  production_save_dir: "heatmaps/heatmap_production_results"
  batch_size: 256

# ------------------------------------------------------------------------------
# DONNÉES ET ACCÈS AUX LAMES (SLIDES)
# ------------------------------------------------------------------------------
data_arguments:
  data_dir: "/data"
  data_dir_key: "source"
  process_list: "heatmap_demo_dataset.csv"
  preset: "/results/process_list_autogen.csv"
  slide_ext: ".mrxs"
  label_dict:
    LUAD: 0
    LSCC: 1

# ------------------------------------------------------------------------------
# PARAMÈTRES DE DÉCOUPAGE (PATCHING) & ENCODEUR
# ------------------------------------------------------------------------------
patching_arguments:
  patch_size: 256
  overlap: 0.5
  patch_level: 0
  custom_downsample: 1

encoder_arguments:
  model_name: "resnet50_trunc" # Options: resnet50_trunc, uni_v1, conch_v1
  target_img_size: 224

# ------------------------------------------------------------------------------
# ARCHITECTURE ET CHARGEMENT DU MODÈLE
# ------------------------------------------------------------------------------
model_arguments:
  ckpt_path: "heatmaps/demo/ckpts/s_0_checkpoint.pt"
  model_type: "clam_sb"
  initiate_fn: "initiate_model"
  model_size: "small"
  drop_out: 0.0
  embed_dim: 1024

# ------------------------------------------------------------------------------
# RENDU DE LA HEATMAP (VISUALISATION)
# ------------------------------------------------------------------------------
heatmap_arguments:
  # --- Paramètres de base ---
  vis_level: 1            # -1 pour le downsample auto (~32x)
  alpha: 0.4              # Transparence (0: H&E pur, 1: Heatmap pure)
  cmap: "jet"             # Palette de couleurs
  blank_canvas: false     # Mettre à true pour ignorer l'image H&E en fond
  save_orig: true         # Sauvegarder l'image originale pour comparaison
  save_ext: "jpg"
  custom_downsample: 1

  # --- Algorithme et Post-traitement ---
  calc_heatmap: true      # Calculer avec overlap
  use_ref_scores: true    # Normalisation par rapport aux patches non-chevauchants
  blur: false             # Lissage Gaussien
  use_center_shift: true  # Précision des contours pour les patches
  binarize: false         # Seuillage binaire des scores d'attention
  binary_thresh: -1       # Seuil si binarize est true

  # --- Zone d'intérêt ---
  use_roi: false          # Limiter le calcul à x1, x2, y1, y2

# ------------------------------------------------------------------------------
# ÉCHANTILLONNAGE DES PATCHS (POUR INSPECTION)
# ------------------------------------------------------------------------------
sample_arguments:
  samples:
    - name: "topk_high_attention"
      sample: true
      seed: 1
      k: 15               # Nombre de patchs à extraire
      mode: "topk"        # Extraire les patchs avec la plus haute attention